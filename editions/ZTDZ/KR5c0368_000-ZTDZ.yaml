front:
  text: 龍角山記不七
  hash: sha256:c598e710e51e09a7a73b426fb2f51d2489359d5c39be6bbf596e58927107e0b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0368_SJB_000-190692b, image: sjb/19/190692b.png}
body:
  text: 唐明皇御製慶唐觀紀聖銘神也者妙有物而爲言化也者應無方而成象言豈立神之主象微宰化之知苟言象之不存焉則神化或幾乎息矣窮神而極化者其唯至聖之人乎我遠祖玄元皇帝道家所號太上老君者也建宗於常無有立行於不皦昧知雄守雌爲天下谿知白守辱爲天下谷故能長上古而日新雕衆形而化淳韲萬物而不爲戾澤萬代而不爲仁巍乎不睹其頂深乎不測其極復歸無物存教迹以立言奄有太清感聖期以利見肇我高祖之提劍起晋太宗之仗鉞入秦鵬搏風雲麟鬥日月夏臣醜而已去殷鼎輕而未徙老君廼洗然華浩白驥朱髦見此龍角之山示我龍興之兆語絳州大通堡人吉善行曰吾而唐帝之祖也告吾子孫長有天下於是一開赤伏而萬姓宅心一麾白髦而六合大定傳曰有聲之聲不過百里無聲之聲延及四海非夫神唱明德翕叶人祇者歟善行以武德三年二月初奉神教恐無明徴未之敢洩至四月老君又見曰石龜出吾言實于時太宗爲秦王討宋金剛總戎汾絳晋州長史賀若孝義以其狀上啓遽使親信杜昂就山禮謁俯仰之際靈貌察焉昂馳還曰信矣廼遣昂善行乘馹表上比至長安適會郇州獻瑞石龜有文曰天下安千萬日高祖徴其二異拜善行朝散大夫命舍人柳憲往祠焉玉帛既陳尊儀復見其始覿也杲杲炅炅若紅峰緑嶺吐春日之光景其却隱也蕭蕭條條若雨息雲消視秋天之沉寥來莫知其所自去莫辨其所往出於寂寞入於惚恍蓋不可得而詳諸汾陽之龍角山者天地降福之庭高祖用師之道峰上有華池靈府下有石穴洞宫氣接姑射集神仙之别館脉通霍鎮潤珠玉之鄰家高祖以雲轡頻迴霓裾累𧝬故版廟於行過之所劃壇於受命之場刻飾聖容彩繪真衛神光離合殿堂宛轉於空間雲氣踟躇笙磬往還於天路因改浮山縣名神山焉志靈應也是歲仲秋及五年三月晋州奏老君言我亳廟之中枯栢更生子孫當王又云我神兵助軍伐劉黑闥立夏當平事果如言皆先事之䜟也爾後太宗貞觀則矞雲泊於廟宇高宗垂拱則卿雲涌於神座今又祠中栢樹蒲萄褭而托根門端根木枯枝蓊而還茂疊黛豐本撲翠繁柯聚祥煙青靄黕黕一色散佳氣葱鬱鱗鱗萬重識者以爲太和暢陳朽之徴王會納殊鄰之象懼彼虚應摇然夕惕朕演靈金根命璿扆篤學道記常味至言是用假塗禮樂託宿仁義尋末以窺本澄麤以詣精爲無爲於此心事無事於天下而宗稷大福寰縣小康實上祖惠無疆之休亦下人率自然之化夫唯幽容昭見偉事也神告帝符環瑞也發祥善行吉類也慶雲重代鴻懿也戎果附植合異也槁榦華滋蕃熾也此六者興王之嘉祉曠曆之絶記者已朕不敏頗聞君子之教矣繼其後者天其祖習其訓者父其師揄揚道德情存孝敬啇頌美乎成湯周雅尊乎后稷先王之舊典也吾豈墜其文哉夫戴角之類龍爲之長羊也定形而不易龍也神化而無端龍蓋五土之精國家乘土而王故改山號名龍角焉乃銘金石以彰靈變詞曰思文聖祖玄默靁聲混兮無名超兮至清清入神舍名損物假身尊玄元後有天下高祖鳳翔雲舉晋陽太宗龍戰風趨秦甸龍角仙都王師戒塗聖形入有神言出無瑶衣玉騎告帝天符神方據我人亦來蘇乃立清室微微謐謐衆仙停蹕乃興慶雲氛氛氲氲再瑞明君庭有栢兮遠果寄秀門有桹兮瘣條更茂顧慙菲德蒙神之祐誦我道經介我神聽繼明五聖禋事三靈請從格言天德出寧大道幽蔭湛慈廣接意路何階言津難涉化有影響神無華葉開元十七年太歲己巳九月己丑朔三日辛卯建維大唐先天二年歲次癸丑七月癸亥朔五日丁卯奉誥投龍修功德使道士楊太希賫送勑賜玄元皇帝法服於此廟所設齋醮行道五日便迴五方鎮綵本命文繒錢絹等物敬造金闕天尊像一所奉爲太上皇元始天尊像一所奉爲皇帝二真人爲侍者奉爲金仙玉真二公主師其像乃靈儀絢發若感曜於珠星瑞色端嚴似迎祥於紫氣巧盡猶龍之迹妙窮若客之姿所願申此忠誠啓兹冥祐庶此神真降迹名高四大之尊握契紫辰賞極三宫之寵悠悠巨劫蠢蠢含生長辭有情之源永處無爲之樂唐明皇詔下慶唐觀勑天地以大德生群有聖人以大寶守萬物古者受命之君謂之承天之序明有所代夫豈徒然若道無欽崇命不永保帝實臨汝人曷戴君朕所以每至庶兮合於二覆之意也夫宓犧神農黄帝堯舜或誅而不怒或教而不誅彼亦何爲獨臻于此朕自有天下二紀及兹雖未能畫衣以禁亦未嘗刑人于市而政猶踳駮俗尚澆漓當是理之者心未返於本耳凡人豈不仁於父母兄弟不欲於飲食衣服乎而卒被無孝友之名不温飽之困其故何哉蓋未聞義方不識善道或任小智而譏笑或見小利而苟得致遠則窮繼之以暴己而身受戮辱家不相保愚妄之徒類多自陷獄訟之弊恒由此作吁可悲兮亦在教之不明也蓋刑罰者不獲已而用之天下黔黎皆朕赤子以誠告示其或知歸不必用威然後致理先務仁恕寧不懷之且如五常循行豈須深識六親和睦何待丁寧自宜勉之以副所望刑措不用道在于兹今獻歲云吉迎氣伊始敬順天命無違月令所由長吏可舉舊章諸有嫗伏孕育之物蠢動生植之類慎勿殺伐致令夭傷九土異宜三農在候聚衆興役妨時害功特宜禁止以助春事至如家有征鎮人或孤惸物向陽和此獨憂悴良可憫也亦令所司隨事憂恤蓋不體仁無以爲長不知道無以用心故道者衆妙之門而心者萬事之統得其要會可以兼濟於人失其指歸不能自全於己故我玄元皇帝著道德五千文明乃眞宗致於妙用而有位者未之講習不務清浄欲令所爲之政教粹美而至於太古者耶百辟卿士各須詳讀勉存進道之誠更圖前席之議至如計校小利綜繹煩文邀名且行去道彌遠違天和氣生人怨心朕甚饜之所不取也各勵精一共興玄化俾蒼生登於仁壽天下還於淳樸豈遠乎哉行之可至其老子宜令士庶家藏一本乃勸令習讀使知指要每年貢舉人等量减尚書論議一兩條策准數加老子策俾敦崇道本附益化源朕推誠與人有此教誡必驗行事豈垂空言今之此勑亦宜家置一本每須三省以識朕懷開元二十一年正月一日唐明皇再詔下太上老君觀不離於精不離於眞以天爲宗以道爲門兆於變化謂之聖人吾祖也太上玄元皇帝嘗從事於斯矣惟穹昊厥初則配神明饗天地育萬物惟皇受命則師列壁熙以大一利澤施於四海不言所利德教加乎萬姓不稱其德將晦迹也安乎守藏柱下將行道也適乎流沙罽賓所謂神無方而道無體冲用可見矣流長者慎其源蔕固者深其根猗歟那歟克開厥後繄我列祖光啓大中豈玄天私乎有唐惟玄元邁乎種德豈玄元式受唐命惟玄元存乎其人是以累聖緝熙重光纘茂大化漸被乎八表淳德殷流乎萬國則於天地有興立焉惟小子多于前功夙夜敬止上承祖宗之餘慶下膺侯王之樂推惕然深居凛若馭朽以爲道德者百家之首清浄者萬化之源務本者立極之要無爲者太和之門恭承垂裕之業敢忘燕翼之訓故詳延博達講諷精微求所以理國理身思至乎上行下效亦云久矣夫使天下萬姓飲淳德食太和靡然迴心而向道豈予寡薄獨能致此蓋凡百在位所以咸熙書曰元首康哉股肱良哉又曰股肱惟人良臣惟聖斯一德而共理也豈至於今𨂂盭乎昔長纓紫衣猶聞慕向廣眉高髻且云變俗何至道之難明而玄珠之乆喪古人有云王者之於天下猶一堂之上也蓋謂同心同德化流四裔是誠在乎擊豕垂踵之惑革面向隅之哀故往年布令各家藏道德冀德立而風靡道存而日用則朕之陳祖業尚家書出門同人無媿於天下矣易曰象也者像此者也經曰窈冥中有精則窈冥之精可以尋象求不可以名言得也故考圖史凡聖祖降代出處之迹敢立像以盡其意焉將自家而形國由中而及外也庶乎知道者盈量而歸迷方者不遠而復云開元二十七年太歲己卯正月甲午朔十五日戊申眞珠洞按圖經云真珠洞者在龍角山東南峰側有洞闊八尺深四十八尺内漸廣深不可測每有珠出於洞因此爲號先天二年並大曆中嘗勑使祭醮玄元皇帝以龍璧投於洞中至晋天祐年有奉使新羅者暨至其國見向之二寶俱汎出水中既還長安因表以進之其洞内往往聞笙簫管磬之音也慶唐觀金籙齋頌朝議郎左拾遺内供奉博陵崔明光纂空洞之中溟涬之際靈文尚矣混成眹焉混成者何象帝之先靈文者何龍漢之年五劫交周尊神遞運九炁列正元始自然冶於流火之庭鍊於陽明之館二儀得之以定位三景得之以發光赤明開圖碧落普度玄元奄有大道遂荒真宗天法之以無倪皇仰之而未及犧軒應運堯舜乘時均至化而思齊酌玄風而殆庶獨立千古湛兮若存首出百王悠兮不極矣粤若祖聖系襲神宗先天不違後天繼代錫胤慶遠派源流長國家纂戎欽承前烈三合一德六葉同道平陽郡玄元宫者興王之肇兆也惟初授命載告休徵權輿靈迹俶落祠宇昭彰於國史乃今昇平配永嘉瑞增修清廟大建閟宫明白於御碑因吾道爲天下程由兹地爲天下式非夫至聖敦能預之哉皇帝御辨無爲齋心正一寤寢有感髣髴眞容昭孝孫之精誠貽列祖之玄訓開元得聖像天寶獲靈符丕慶再集而繁昌至教遂興而畢備祗崇册禮其高莫二衮龍克光於像設冤旒追尊於帝位雖猗那商頌生人周雅儔之於昔今則過矣於鑠兹山會神之寓西對姑射北鄰天柱寔通仙之秘府也正殿肅穆廣庭森沉峰巒左右松栝交陰總虚無以靜深也石壇重階瓴甓環甃隱訣三五洞章護持三元表辰八月降誕每至是日展法於斯修金籙齋啓玉皇印道家之寶王者之儀靡盛於此矣乃開乾門闢坤户氣引廣莫風和不周八卦行乎其中矣仰列宿躡魁罡落日淪陰夕時沆瀣六甲佐乎其旁矣仙侣頒次羽人步虚朝拜九天醮祠五老想勾陳則黄雲垂覆存太乙則白鶴來翔其餘侍香玉童傳言玉女縹緲煙景徘徊元空求之希微宛如契合厥惟鎮皇極叶時邕外以廓清萬里戎夷向化内以義安兆庶年穀滋稔滅格檡興昌光動植生成陰陽氣茂利兵所指則戢干戈靈官所臨則消疵癘矧感通上界神降祺福景命來假天子萬年者乎觀主臣郭處寂虔恭是勤夙夜匪懈禀師之録佩嶽之符躬執科儀爰謀法要開元十六載御題觀額因隸於兹二十五年上疏議齋帝俞其請於是内使高真自王城而至綸言祕旨從天上而來諸侯肅臨郡邑蕆事革故垣楝鼎新經像彤彩赩赩金光熒熒曾是所營曾是有成利乎永貞太守臣裴眺並寮屬等惟道孚敬誼形于政奉休慶臮合觀徒衆等皆相與遵乃宗極體乎自然熙淡漠於元和抃恬愉於大順微臣嘗佐汾邑親睹聖蹤强名道原用述真宰從窅冥而辨物因象罔而得之其詞曰三炁之宗粤玄元始朱靈丙午赤明斯紀太上道君託胎洪氏後天合德其惟我李爰初啓運符命歸唐海縣攸屬六葉重光天寶是膺萬壽無疆大君推策考曆元陽空玄之中自然妙有無鞅之衆勃勃珠口迎不見前隨不見後外物雖變我法彌乆龍角嵯峨肇興靈跡仙宫乃建清都斯宅洞裏天長寰中地隔皇矣大道臨下有赫金籙秘訣玉京玄言陞壇之禮衆法之門聖祖貽訓永告孝孫於兹授命永保元元克昌厥後大慶常存刊此樂石以奉至尊天寶二年歲次癸未十月丙寅朔十五日庚辰下元齋建紀瑞皇上御宇之三祀春三月旬有八日晋慈等州都團練觀察處置使檢校左散騎常侍兼御史大夫賜紫金魚袋李寰齋沐虔潔祠于神山慶唐觀聖祖玄元皇帝禮成謁于高祖太宗高宗中宗睿宗玄宗六聖之真廟靈感昭發休光動天然後登龍角昇華池陟林嶺瞻翠微見瑞栢之奇狀審循葛之延蔓龍鳳交貫垂于廟庭次生新枝有以表聖祚於百萬年矣上玄之意必將使茂聳貞固樹之無疆當大曆十四年之三月曾生一枝已備圖牒當今年三月又生一枝故知曆數昌期邈不可算帝王符契自合玄經寰忝列宗枝謬當亷察聞斯靈迹心不遑安乃首擇吉日禮祈尊像遂與監軍使朝議郎行内侍省内府局丞員外置同正員上柱國賜緋魚袋吴再和左神策軍監鐵冶使朝議郎行内侍省内府局丞張令綰等同檢驗所植栢樹高下葛蔓尺寸仍令工者圖畫其形狀具表上聞乃刻碑陰用傳不朽慶唐觀碑銘並序將仕郎知神山縣事韓望譔道母萬物物猶子生象成太初囊括元氣抉散氤氲先天地有禀立純粹保合大和故天得而清地得而寧神得而靈谷得而盈王侯得而爲天下正道苟湮鬱則象無所出必天不垂日星地不竅山川神紊陰隲人窒性情故無不通無不具吞兩儀而不見其實納毫末而不睹其隘不可以眸覘不可以智運其象無體萬物之象其體也其名無稱萬物之名其稱也不可謂之有謂之有形其器也不可謂之無謂之無滅其變也有生於無無根於有有無一貫存於萬物然後見道之妙物之始故曰有物混成先天地生寂兮寥兮獨立而不改周行而不殆以是而稽則知人法地地法天天法道道法自然而爲域中之大者道冠首焉老子仕於姬周子孫延於漢魏仲尼見而歎其猶龍子長叙而爲隱君子事跡藹然備載經史洎泰山其頽禮樂之言圯青牛告逝道德之論隳自後以波引蔓延散而不聚故揚墨塞路背仁義之說莊列當途立寓言之理殊不知仲尼老子刊六經之祕旨閲五千之純奥與世作程範圍天地何則六經之旨正而詳道德之奥和而備正則父子親君臣定禮樂昭刑賞中和則心以虚神以清惡以悛善以立故基國樹民包淳剔僞建皇極躋壽域未有遺儒捐道而後臻其理者也洎後世益醨前聖逾遠不能宏啓其教但浩揚厥波故尚玄虚企羽化散帔峨冠目爲道士得徒既繁大壯觀廟堊泥致像研丹寫形與浮屠氏並驅滔源茂林盛於中國其來尚矣昔隋獲神器煬不固基征遼幸淮以人從欲茫茫九土民不聊生怨入骨髓天下興叛唐公拯疲參墟啓號義聲高唱響振四海雖契人心衆盗猶梗逐鹿之功未知誰手時武德三祀晋人吉善行於羊角山見白衣老父鬚鬢皓然乘白馬朱鬛儀容甚偉有二青衣童子侍之謂善行曰爲吾語唐國天子吾爲老君即汝祖也平賊後汝當爲帝天下太平享國長久太宗遣使者杜昂致祭須臾神復見謂杜昂曰歸語天子我不飲食何煩於祭忽然不見上異之立廟於其地繇是改浮山羊角之號以爲今名洎乾封元年追尊太上玄元皇帝爾後以土德下衰木入南斗朱梁總權禪唐寰鼎篡弑薦興其祚不永莊皇超並復唐舊業故亳宫枯栢再榮慶唐靈蔓引秀歷代瑞應邦史具存洎石晋劉漢之後干戈圖王日不暇用此觀以地僻山逈居晋南隅官不給材人罔興力奮宇前址相漸而隳先是李唐以神堯至玄宗圖六帝之容翼侍三皇正殿歲月云邁彩不焕然雖聚其徒日莫能葺往跡未傾前跡不踵都監道士梁志真奮浮俗明大觀捐嗜慾探希夷以爲正其末者必端其本師其人者必崇其教代既不能體道而行人則咸瞻像而慕此觀不完則何以信四方之士鼓冲妙之風邪景德元年春乃裹足上國拜章闕庭序李唐之肇基疏玄元之符瑞復古興靈必當聖代主上執大象司左契道詢崆峒神適姑射却走馬以糞田烹小鮮而治國以萬物利爲利以百姓心爲心方當大順之朝式闡無爲之化乃可其奏宣中書詔晋郡俾重葺舊殿以嚴其祠工既鳩宇未畢二年仲春月二十有五晨霧靄雲蒸嘉氣四塞空山寂然若有所降俄而曙色霽天象廓屹乎醮壇森然古栢芳枝茂葉列樹十六瓊蘂珠英露華可掬其甘如飴祥匪三危瀼瀼湛湛陽不能晞衆目咸睹神而異之于是啓其邑邑告郡郡命僚屬覆驗其實迨初及終八日不散郡繪其圖抗表以進愚嘗聞道可道非常道名可名非常名無名天地之始有名萬物之母故曰有太易有太初有太始有太素太易者未見氣也太初者氣之始也太始者形之始也太素者質之始也老子本是以興言質斯而窮道常無欲以觀其妙有欲以觀其徼故能通幽洞微意賾象外神而化之不拘其變昔告唐以太平今降宋以甘露非其時非其聖孰能通其應而若是者邪望以二年春由太學登甲科筮仕之初出宰兹邑承郡命秉詔旨轄匠篤民修其三殿曰玄元曰三清曰三皇功就而未遑紀其事大中祥符元載罷縣秩將赴調於選部志真磨碑置觀乞撰其文固讓不克直述其由乃爲銘曰道實强名先天地生罔然失象寂爾無聲不皎不昧惟微惟精誰賾玄旨周之柱史象帝之先谷神不死冲而用之去彼取此隋衰唐盛勃然昭聖不出函關告其受命卜世延洪子孫有慶祠嚴山椒唐傾祀遥道德寂寂松栢蕭蕭誰其葺之屬當聖朝聖朝哲王體道而昌俾完壞宇玄教重光何以昭應瑞露瀼瀼其徒志真服膺勤勤企籍丹臺杭章紫宸一日必葺無荒後人時大中祥符元年歲次戊申四月辛卯朔二日壬辰建重修三清殿記天聖觀蓋唐聖祖降真之地形勢壯偉甲於河東其中三殿岌然先後鱗比其一曰老子次曰三清次曰三皇而六帝侍焉自唐迄宋日月寖乆風蠹雨壞櫩宇隳圮而彩色剥落不飭不嚴甚矣垣壁頽缺洞然四達篙萊荒其庭牛羊牧其側不蠲不虔甚矣黄冠星居殊趨異食而害教爲甚其給田也多其輸租也薄而積弊爲甚縣宰公孫公因致祭祠下嗟其荒凉不治遂慨然命工完飾腐敗革去弊事而咸與惟新棟宇崢嶸楹桷丹碧向之不飭不嚴者變而輪奐環以垣墉剗其蕪穢向之不蠲不虔者變而肅潔葺齋庖以同其食闢道堂以一其居向之害教者去矣增一歳之課益數倍之利向之積弊者斯除矣於是諸道士相謂曰公孫公可謂賢哉新吾之宫輯吾之徒利吾之衆援吾之教俾過者生恭入者生恪起四方歸仰之誠心其爲功豈小補耶扶持吾道旣衰而復興者實自公始兹成事也不可無紀述顧謂靳芑書之政和元年六月望日記重修嘉潤侯殿記進士王建中撰蓋聞近代已來屢改神號進封侯爵首謚之爲華池中更之爲顯施末命之爲嘉潤三者同出而異名焉惟神靈氣所宅森矗山巓有泉浸于深池雲龍藏乎其中峰巒揺動相激而鳴是爲聖水出之兆也每遇旱歲所在祈禱兹水應誠甘澍靡不霑足故遐邇蒙其霈澤者豈止一方而已哉伏睹殿基逼窄棟宇摧毁孰其揭舉爰有南李村李隱上董村陳思恭共發虔心同爲糺首相謂池逼殿階故遷神座丈餘間前植香亭後築基址鳩工集材輪奐締搆不日而成即擇是歳中元節淩晨就殿告成畢復詣觀徧請道衆嚴設香齋及召協力人户同爲慶會僕因是日亦往觀焉預命作記實叙其事刊諸翠珉傳不朽矣時天會十一年中元日建重修華池嘉潤侯殿記鄉貢進士田蔚撰竊以亘古迄今名山洞府天地神祇聖跡靈異或靈顯于世或功加于民莫不載在祀典祭獻以時以荅神恩今本縣南距三十里有龍角山焉舊名羊角山因唐改號其山二峰東峰曰華池西峰曰將軍在圖經所載其號古老相傳莫究其詳其神之靈異功加于民莫可名狀至李唐武德初太上現於龍角山前甘棠間見曲沃人吉善行令報唐天子時善行諧朝具言其事神堯高祖大喜遂立觀于山前號曰慶唐觀是時太宗統軍在絳遺杜昂祭於所現處而太上復現謂昂曰吾不飮不食又何祭焉當時居民謂太上所現眞身之地必是洞天福地益敬其神而東峰謂之華池者而峰上有池深妙莫測龍神隱焉其池内有石常時乾净遇旱則鄉民祈禱于池而其池乾石上自潤而生水世號華池聖水鄉民請水虔奉供養無不應感隨水而雨降故詩人詠之曰救旱泉當時居民虔奉其神供敬其池因建殿于池上號曰華池殿自唐歷五代而之宋祈求無不應感而宋賜號顯施眞人又進封號嘉潤侯其爲華池聖水一也其殿既乆殿貌故弊甚不稱靈神安止後至歲在癸酉間鄉民李隱獨有意焉于時遂率李革陳思恭同化集鄉衆展其基址增其香亭重行修蓋其功美哉逮至歲在戊辰三月十有四日忽值天火焚燒其殿宇盡爲灰燼居民莫不哀念又前修殿維那李隱復率鄭錫陳諫李革及本觀前都道録閻子美知觀董茂華郭茂昭陳惟福陳惟素丘惟凝崔自淵崔居實共啓虔誠謂華池靈顯于世功加于民其神像殿貌重復修崇不可後時遂紏集鄉衆化集所用之物命工重行修蓋不日崇成煥然一新實其美事其維那李隱前後率衆興功不爲細矣及衆維那之功自畢功之後殊無考記若不刊石紀功則修崇之功無復聞於後世時歲在丁丑仲春僕因假道教學於觀前其元維那命僕爲記非敢尚虚詞以襄美特書其實録以貽後代傳之不朽云爾時丁丑歲仲秋二十日記祈雨祭文維大定十一年歲次辛卯四月乙巳朔二十四日戊辰將仕郞行臨汾縣主簿郝璟謹以香茶酒果之奠敢昭告于華池嘉潤侯之神竊惟民者邦國之本神明之主也故國非民無以衛杜稷神非民無以供祭祀是邦國之與神明其休戚皆繫於民一體而同患者也今自春及夏時雨亢二麥已不穡秋種未入土民皆乏食哀鳴嗷嗷將流離於四方而填委於溝壑矣則司牧百姓及享其祭祀者其得而安之乎惟神掌雷雨之權握風雲之柄奮然一起則四方群生皆被其澤使邦國之基有以爲固而神明亦永有所依顧不偉歟今奉大府命敬謁祠下挹靈液而奉事之惟神龍屯其膏三日之内甘雨霑足神之惠也民之望也守令者之幸也伏惟尚饗賀雨還水祭文郝璟謹以香果之奠敢昭告于華池真君嘉潤侯之神頃以時雨愆亢敬禱祠下蒙賜靈液曾未信宿甘澍獲應四境霑足百穀以生邦國以寧神之所惠亦以豐矣謹復致靈液於祠下以謝景貺惟神其鑒之尚饗祈雨祭文郭隱秀等謹以香果之奠敢昭告于嘉潤侯竊以至道無方精誠有感凡禱祈以通幽諒神明而應兆兹者時值亢陽乆愆甘澍寔下民積釁以彌深仰上聖垂慈而密佑伏願油雲湧布迄虚空渺邈之鄉霈澤普施徧日月照臨之所塵埃頓息苗稼重甦變凶荒而作豐登消疵癘而爲吉慶在在處處一切含靈俱沐天恩咸蒙道廕賀雨醮謝文伏以神龍薦祉克符元首之禎風雨應期足表精誠之感否泰交通雲雷混合霑槁稼以重甦灑輕埃而泯絶群心悅懌百穀滋榮睹豐兆則信可徵摧癘菑則知不作倉箱有望長幼無虞輒憑玉笈之靈科用答高真之景貺共荷鴻休均蒙大賫祈雨文天且何言示咎徵而見譴人能知懼託誠意而可禳敢罄愚衷仰干神聽伏念臣等于身致養以食爲先儻有害于三時將阻饑於數口爰從比歲併值旱灾百穀無成屢失豐登之望四民何賴共形捐瘠之憂豈非積惡之招以致恒暘之罰尚祈悔過是用新心乃延琳宇之流試講金科之典冀雲軿之來格宥芻狗之無知甘雨祥風茂育大田之稼歡聲和氣載歌高廩之年祈雪文王良翰謹以清酌庶羞之奠致祭于將軍華池之神惟神祐此一方千百年矣民知有賴于神故望於神者重則神之於民也忽棄之乎切以自秋八月至于今一百五十餘日旱乾塵翳雨雪杳然民之病者甚衆麥之槁者寔多來歲夏望民懷愁額抑亦良翰爲政之不善歟抑亦有冤獄未雪歟然政之不善吏之不職民何辜焉伏願神惟民愛而速降瑞雪使民有來麰之望則科差易了而無逋逃之患盜賊弭寧而各安其業矣神其鑒之尚饗龍角山記
